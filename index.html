<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>L3 Agency — Tracker 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --y:#F0BB3D;--yd:rgba(240,187,61,0.13);
  --d:#16161a;--d2:#1e1e23;--d3:#28282f;--d4:#35353e;
  --cr:#F0EFec;--si:#7a7875;--si2:#b0ada8;--w:#fff;
  --r:12px;--r2:8px;
  --live:#2ecc71;--prog:#F0BB3D;--rev:#5dade2;--plan:#aaa;--ongo:#5dade2;--hold:#e74c3c;--done:#27ae60;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{background:var(--d);color:var(--cr);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;line-height:1.5}

/* ── CONNECTING ── */
#connecting{position:fixed;inset:0;background:var(--d);display:flex;align-items:center;justify-content:center;z-index:998;flex-direction:column;gap:16px}
.spin{width:36px;height:36px;border:3px solid rgba(240,187,61,0.2);border-top-color:var(--y);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#app{display:none}

/* ── TOPBAR ── */
.tb{background:var(--d2);border-bottom:2px solid rgba(240,187,61,0.15);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;gap:8px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--w);display:flex;align-items:center;gap:7px;white-space:nowrap;letter-spacing:-0.3px}
.logo-y{color:var(--y)}
.logo-sl{color:var(--si);font-weight:300;font-size:12px;margin-left:3px}
.ldot{width:7px;height:7px;background:#27AE60;border-radius:50%;animation:pulse 2.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.dbadge{font-family:'DM Mono',monospace;font-size:11px;color:var(--si2);background:var(--d3);padding:5px 12px;border-radius:20px;display:none}
@media(min-width:600px){.dbadge{display:block}}
.btn-add{background:var(--y);color:var(--d);border:none;padding:9px 18px;border-radius:var(--r2);font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-add:hover{background:#e5af30;transform:translateY(-1px);box-shadow:0 4px 16px rgba(240,187,61,0.3)}
.btn-sm{background:var(--d3);border:1px solid rgba(255,255,255,0.08);color:var(--si2);padding:7px 11px;border-radius:var(--r2);cursor:pointer;font-size:15px;transition:all .15s;line-height:1}
.btn-sm:hover{border-color:var(--y);color:var(--y);background:var(--yd)}
.menu-btn{display:none;background:var(--d3);border:1px solid rgba(255,255,255,0.08);color:var(--si2);padding:8px 11px;border-radius:var(--r2);cursor:pointer;font-size:17px;align-items:center;transition:all .15s;line-height:1}
.menu-btn:hover{border-color:var(--y);color:var(--y)}
@media(max-width:768px){.menu-btn{display:flex}}

/* ── LAYOUT ── */
.lay{display:flex;min-height:calc(100vh - 58px)}

/* ── SIDEBAR ── */
.sb{width:220px;background:var(--d2);border-right:1px solid rgba(255,255,255,0.05);padding:20px 0;flex-shrink:0;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;transition:transform .25s}
@media(max-width:768px){
  .sb{position:fixed;top:58px;left:0;height:calc(100vh - 58px);z-index:90;transform:translateX(-100%);width:260px;box-shadow:4px 0 24px rgba(0,0,0,0.5)}
  .sb.open{transform:translateX(0)}
}
.sb-overlay{display:none;position:fixed;inset:0;top:58px;background:rgba(0,0,0,0.6);z-index:89}
.sb-overlay.open{display:block}
.sb-s{padding:0 12px;margin-bottom:22px}
.sb-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--si);text-transform:uppercase;padding:0 8px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.sb-lbl-btn{cursor:pointer;color:var(--y);font-size:14px;line-height:1;padding:2px 4px;border-radius:4px}
.sb-lbl-btn:hover{background:var(--yd)}
.ni,.pr,.mr,.cli-row{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--r2);cursor:pointer;font-size:13px;color:var(--si2);transition:all .12s;margin-bottom:2px}
.ni:hover,.pr:hover,.mr:hover,.cli-row:hover{background:rgba(255,255,255,0.05);color:var(--w)}
.ni.act,.pr.act,.mr.act,.cli-row.act{background:var(--yd);color:var(--y);font-weight:500}
.mr{font-family:'DM Mono',monospace;font-size:11px;justify-content:space-between}
.cli-row{font-size:12px;justify-content:space-between}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:10px;flex-shrink:0}
.avA{background:rgba(255,255,255,0.07);color:var(--si);font-size:8px}
.avC{background:var(--y);color:var(--d)}
.avM{background:var(--d4);color:var(--w);border:1px solid rgba(255,255,255,0.15)}
.avD{background:var(--si2);color:var(--d)}
.mcnt{background:var(--d3);border-radius:10px;padding:2px 8px;font-size:10px;color:var(--si);flex-shrink:0}
.cli-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}

/* ── MAIN ── */
.main{flex:1;padding:18px 16px;overflow:auto;min-width:0}
@media(min-width:768px){.main{padding:26px 30px}}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:22px}
@media(min-width:900px){.stats{grid-template-columns:repeat(4,1fr)}}
.sc{background:var(--d2);border:1px solid rgba(255,255,255,0.06);border-radius:var(--r);padding:18px 20px;transition:border-color .2s}
.sc:hover{border-color:rgba(240,187,61,0.2)}
.slbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--si);text-transform:uppercase;margin-bottom:8px}
.sval{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:var(--w);line-height:1}
.sval.ac{color:var(--y)}
.ssub{font-size:11px;color:var(--si2);margin-top:5px}
.pr2{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.pn{font-size:11px;color:var(--cr);width:52px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pt{flex:1;background:rgba(255,255,255,0.06);border-radius:4px;height:5px}
.pf{height:5px;border-radius:4px;background:var(--y);transition:width .5s}
.pc{font-family:'DM Mono',monospace;font-size:10px;color:var(--si2);width:20px;text-align:right;flex-shrink:0}

/* ── FILTER BAR ── */
.fb{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.fl2{font-family:'DM Mono',monospace;font-size:9px;color:var(--si);letter-spacing:1.5px;text-transform:uppercase;margin-right:2px}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--si2);cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.chip:hover{border-color:rgba(240,187,61,.5);color:var(--cr)}
.chip.act{background:var(--y);color:var(--d);border-color:var(--y);font-weight:600}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.st{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--w);display:flex;align-items:center;gap:8px}
.st::before{content:'';width:4px;height:18px;background:var(--y);border-radius:2px}

/* ══ DESKTOP TABLE ══ */
.tw{background:var(--d2);border:1px solid rgba(255,255,255,0.06);border-radius:var(--r);overflow:hidden;margin-bottom:24px;box-shadow:0 4px 24px rgba(0,0,0,0.2)}
.tw-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:820px}
thead th{background:var(--d);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--si);padding:13px 14px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.05);font-weight:500;white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,0.025)}
tbody tr:last-child{border-bottom:none}
td{padding:13px 14px;vertical-align:middle}
.tn{font-weight:600;color:var(--w);font-size:14px;min-width:160px;line-height:1.4}
.ta{text-align:right;white-space:nowrap}
.ib{background:none;border:none;cursor:pointer;color:var(--si);padding:5px 7px;border-radius:5px;font-size:14px;transition:all .12s}
.ib:hover{background:rgba(255,255,255,0.08);color:var(--w)}
.ib.del:hover{background:rgba(231,76,60,0.15);color:#e74c3c}
.mg td{background:rgba(240,187,61,0.05);padding:7px 14px;border-bottom:1px solid rgba(255,255,255,0.05)!important}
.mgl{font-family:'Syne',sans-serif;font-weight:700;font-size:10px;letter-spacing:1.5px;color:var(--y);text-transform:uppercase}
.er td{text-align:center;padding:48px;color:var(--si2);font-size:13px}

/* ══ MOBILE CARDS ══ */
.card-list{display:none;flex-direction:column;gap:12px;margin-bottom:20px}
@media(max-width:768px){
  .tw{display:none}
  .card-list{display:flex}
}
.task-card{background:var(--d2);border:1px solid rgba(255,255,255,0.07);border-radius:var(--r);padding:16px;position:relative;overflow:hidden;transition:border-color .15s}
.task-card:hover{border-color:rgba(240,187,61,0.2)}
.task-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--y);border-radius:3px 0 0 3px}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.tc-name{font-weight:700;color:var(--w);font-size:15px;line-height:1.3;flex:1}
.tc-actions{display:flex;gap:4px;flex-shrink:0}
.tc-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;align-items:center}
.tc-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--si2)}
.tc-field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:120px}
.tc-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--si);text-transform:uppercase}
.tc-val{font-size:12px;color:var(--si2)}
.tc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.05)}

/* ── INLINE EDITABLE CELLS ── */
.editable{cursor:pointer;border-radius:5px;padding:2px 4px;margin:-2px -4px;transition:background .12s;display:inline-flex;align-items:center;gap:4px;position:relative}
.editable:hover{background:rgba(255,255,255,0.07)}
.editable:hover::after{content:'✎';font-size:9px;color:var(--si);margin-left:2px}
.editable-dash{color:var(--si);font-size:12px;cursor:pointer;padding:2px 6px;border-radius:5px;border:1px dashed rgba(255,255,255,0.1);font-family:'DM Mono',monospace;font-size:10px;transition:all .12s}
.editable-dash:hover{border-color:var(--y);color:var(--y)}

/* ── GENERIC POPOVER ── */
.pop{position:fixed;background:var(--d3);border:1px solid rgba(255,255,255,0.12);border-radius:var(--r);padding:8px;box-shadow:0 16px 48px rgba(0,0,0,0.65);z-index:300;display:none;min-width:200px;max-width:280px}
.pop.open{display:block}
.pop-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--si);text-transform:uppercase;padding:4px 8px 8px;border-bottom:1px solid rgba(255,255,255,0.07);margin-bottom:6px}
.pop-opt{padding:9px 12px;border-radius:var(--r2);cursor:pointer;font-size:13px;transition:background .1s;display:flex;align-items:center;gap:8px}
.pop-opt:hover{background:rgba(255,255,255,0.07)}
.pop-opt.sel{background:var(--yd)}
.pop-input{background:var(--d);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r2);padding:8px 10px;color:var(--w);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:100%;transition:border .15s;margin-bottom:6px}
.pop-input:focus{border-color:var(--y)}
.pop-btn{background:var(--y);color:var(--d);border:none;padding:8px 14px;border-radius:var(--r2);font-family:'Syne',sans-serif;font-weight:700;font-size:12px;cursor:pointer;width:100%;transition:all .15s}
.pop-btn:hover{background:#e5af30}
.pop-confirm{display:flex;gap:6px;margin-top:4px}
.pop-confirm .pop-btn{flex:1}
.pop-cancel{flex:1;background:none;border:1px solid rgba(255,255,255,0.12);color:var(--si2);padding:8px;border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.pop-cancel:hover{border-color:var(--cr);color:var(--w)}
/* multi-client checkboxes */
.pop-check{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--r2);cursor:pointer;font-size:13px;transition:background .1s}
.pop-check:hover{background:rgba(255,255,255,0.07)}
.pop-check input[type=checkbox]{width:15px;height:15px;accent-color:var(--y);cursor:pointer;flex-shrink:0}

/* ── BADGES ── */
.pb{display:inline-flex;align-items:center;gap:5px;padding:4px 10px 4px 5px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap}
.pbC{background:rgba(240,187,61,.15);color:var(--y)}
.pbM{background:rgba(255,255,255,.08);color:var(--si2)}
.pbD{background:rgba(185,182,178,.15);color:var(--si2)}
.pb-gen{background:rgba(255,255,255,.07);color:var(--si2)}

/* ── STATUS PILL ── */
.sp{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .12s;user-select:none}
.sp:hover{opacity:.8;transform:scale(1.03)}
.sl{background:rgba(39,174,96,.18);color:#2ecc71}
.sg{background:rgba(240,187,61,.18);color:var(--y)}
.spe{background:rgba(122,120,117,.18);color:var(--si2)}
.spn{background:rgba(74,74,82,.45);color:#aaa}
.so{background:rgba(52,152,219,.18);color:#5dade2}
.sh2{background:rgba(231,76,60,.18);color:#e74c3c}
.sd{background:rgba(30,132,73,.18);color:#27ae60}

.dt{font-family:'DM Mono',monospace;font-size:11px;color:var(--si2);white-space:nowrap}
.mt{font-family:'DM Mono',monospace;font-size:10px;background:rgba(255,255,255,0.06);color:var(--si2);padding:3px 8px;border-radius:4px}
.mstar{color:var(--y);font-size:10px;margin-left:3px}
.ctag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;background:rgba(52,152,219,0.15);color:#5dade2;white-space:nowrap;font-weight:500;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.lnk{color:var(--y);font-size:11px;text-decoration:none;display:inline-flex;align-items:center;gap:3px;opacity:.85;font-weight:500}
.lnk:hover{opacity:1}

/* ── MILESTONES ── */
.msg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-bottom:24px}
.mc{background:var(--d2);border:1px solid rgba(255,255,255,0.06);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s}
.mc:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,0,0,0.35)}
.mc::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--y)}
.mc.done::before{background:#1E8449}.mc.hold::before{background:#E74C3C}
.mct{font-weight:600;color:var(--w);margin-bottom:10px;font-size:14px;line-height:1.4}
.mcm{display:flex;align-items:center;justify-content:space-between}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.82);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-start;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;padding:12px;overflow-y:auto}
.ov.open{opacity:1;pointer-events:all}
.mo{background:var(--d2);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:28px;width:600px;max-width:100%;box-shadow:0 28px 90px rgba(0,0,0,0.7);transform:translateY(16px);transition:transform .2s;margin:auto}
.ov.open .mo{transform:translateY(0)}
.mtit{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;color:var(--w);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.mtit em{color:var(--y);font-style:normal}
.mtit-close{background:none;border:none;color:var(--si2);font-size:20px;cursor:pointer;padding:3px 7px;border-radius:5px;line-height:1}
.mtit-close:hover{color:var(--w);background:rgba(255,255,255,0.08)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:520px){.fg{grid-template-columns:1fr}}
.fg2{display:flex;flex-direction:column;gap:5px}
.fg2.f{grid-column:1/-1}
.fgl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--si2);text-transform:uppercase;font-weight:500}
.fi,.fs,.ft{background:var(--d);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r2);padding:10px 13px;color:var(--w);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border .15s;width:100%}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--y);box-shadow:0 0 0 3px rgba(240,187,61,0.1)}
.fs option{background:var(--d2)}
.ft{resize:vertical;min-height:70px;line-height:1.5}
/* multi-client in modal */
.multi-cli-wrap{background:var(--d);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r2);padding:8px;max-height:160px;overflow-y:auto}
.multi-cli-wrap:focus-within{border-color:var(--y)}
.mcheck{display:flex;align-items:center;gap:9px;padding:6px 5px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--cr);transition:background .1s}
.mcheck:hover{background:rgba(255,255,255,0.06)}
.mcheck input{width:15px;height:15px;accent-color:var(--y);cursor:pointer;flex-shrink:0}
.ma{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;flex-wrap:wrap}
.bcl{background:none;border:1px solid rgba(255,255,255,0.13);color:var(--si2);padding:10px 18px;border-radius:var(--r2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;transition:all .15s}
.bcl:hover{border-color:var(--cr);color:var(--w)}
.bsv{background:var(--y);color:var(--d);border:none;padding:10px 22px;border-radius:var(--r2);font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s}
.bsv:hover{background:#e5af30;box-shadow:0 4px 16px rgba(240,187,61,0.3)}
.bsv:disabled{opacity:.5;cursor:not-allowed}

/* ── MANAGE MODALS ── */
.mo-sm{max-width:440px}
.cli-list{margin-bottom:16px;max-height:260px;overflow-y:auto}
.cli-item{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:var(--r2);background:var(--d3);margin-bottom:6px;font-size:13px;font-weight:500}
.cli-add-row{display:flex;gap:9px}
.cli-add-row .fi{flex:1}
.cli-add-btn{background:var(--y);color:var(--d);border:none;padding:10px 16px;border-radius:var(--r2);font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s}
.cli-add-btn:hover{background:#e5af30}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:16px;background:var(--d3);color:var(--cr);padding:12px 16px;border-radius:10px;font-size:13px;border-left:3px solid var(--y);transform:translateX(120%);transition:transform .3s;z-index:999;max-width:260px;line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.toast.show{transform:translateX(0)}
.toast.err{border-color:#E74C3C}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:10px}
</style>
</head>
<body>

<div id="connecting">
  <div class="spin"></div>

      <button class="menu-btn" onclick="toggleSb()">☰</button>

<!-- INLINE POPOVER (status, month, owner, date, link) -->

  <div id="pop-body"></div>
</div>

<!-- TASK MODAL -->
<div class="ov" id="ov" onclick="closeOv(event)">
  <div class="mo">
    <div class="mtit"><span id="mtit">+ Nueva <em>tarea</em></span><button class="mtit-close" onclick="closeModal()">✕</button></div>
    <div class="fg">
      <div class="fg2 f"><label class="fgl">Proyecto / Tarea *</label><input class="fi" id="f-task" placeholder="Nombre de la tarea…"/></div>
      <div class="fg2"><label class="fgl">Responsable</label><select class="fs" id="f-owner"><option value="">— Seleccionar —</option></select></div>
      <div class="fg2"><label class="fgl">Estado</label>
        <select class="fs" id="f-status">
          <option>● In Progress</option><option>◆ Planificado</option><option>● LIVE</option>
          <option>◐ Revisión</option><option>↻ Ongoing</option><option>⏸ On Hold</option><option>✓ Done</option>
        </select>
      </div>
      <div class="fg2"><label class="fgl">Mes</label>
        <select class="fs" id="f-month">
          <option>Enero</option><option>Febrero</option><option>Marzo</option><option>Abril</option>
          <option>Mayo</option><option>Junio</option><option>Julio</option><option>Agosto</option>
          <option>Septiembre</option><option>Octubre</option><option>Noviembre</option><option>Diciembre</option>
        </select>
      </div>
      <div class="fg2"><label class="fgl">Fecha inicio</label><input class="fi" type="date" id="f-date-start"/></div>
      <div class="fg2"><label class="fgl">Fecha entrega</label><input class="fi" type="date" id="f-date-end"/></div>
      <div class="fg2 f">
        <label class="fgl">Clientes (selecciona uno o varios)</label>
        <div class="multi-cli-wrap" id="f-clients-wrap"></div>
      </div>
      <div class="fg2 f"><label class="fgl">Enlace (Drive / OneDrive)</label><input class="fi" id="f-link" placeholder="https://…"/></div>
      <div class="fg2"><label class="fgl">Colaboradores</label><input class="fi" id="f-collab" placeholder="Equipo, agencia…"/></div>
      <div class="fg2"><label class="fgl">¿Hito clave?</label><select class="fs" id="f-ms"><option value="no">No</option><option value="yes">Sí ◆</option></select></div>
      <div class="fg2 f"><label class="fgl">Descripción / Actividades</label><textarea class="ft" id="f-desc" placeholder="¿Qué se está haciendo?"></textarea></div>
      <div class="fg2 f"><label class="fgl">Próximos pasos</label><textarea class="ft" id="f-next" placeholder="¿Qué viene a continuación?" style="min-height:56px"></textarea></div>
      <div class="fg2 f"><label class="fgl">Bloqueos / Notas</label><input class="fi" id="f-block" placeholder="Dependencias, bloqueos…"/></div>
    </div>
    <div class="ma">
      <button class="bcl" onclick="closeModal()">Cancelar</button>
      <button class="bsv" id="sbtn" onclick="saveTask()">Guardar tarea</button>
    </div>
  </div>
</div>

<!-- MEMBER MODAL -->
<div class="ov" id="memberOv" onclick="if(event.target.id==='memberOv')closeMemberModal()">
  <div class="mo mo-sm">
    <div class="mtit"><span>👤 Gestionar <em>responsables</em></span><button class="mtit-close" onclick="closeMemberModal()">✕</button></div>
    <div class="cli-list" id="memberList"></div>
    <div class="cli-add-row">
      <input class="fi" id="newMemberInput" placeholder="Nombre del responsable…" onkeydown="if(event.key==='Enter')addMember()"/>
      <button class="cli-add-btn" onclick="addMember()">+ Añadir</button>
    </div>
    <div class="ma"><button class="bcl" onclick="closeMemberModal()">Cerrar</button></div>
  </div>
</div>

<!-- CLIENT MODAL -->
<div class="ov" id="cliOv" onclick="if(event.target.id==='cliOv')closeCliModal()">
  <div class="mo mo-sm">
    <div class="mtit"><span>👥 Gestionar <em>clientes</em></span><button class="mtit-close" onclick="closeCliModal()">✕</button></div>
    <div class="cli-list" id="cliList"></div>
    <div class="cli-add-row">
      <input class="fi" id="newCliInput" placeholder="Nombre del cliente…" onkeydown="if(event.key==='Enter')addClient()"/>
      <button class="cli-add-btn" onclick="addClient()">+ Añadir</button>
    </div>
    <div class="ma"><button class="bcl" onclick="closeCliModal()">Cerrar</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ CONFIG ════════════════════════════════════════════════════════════════════
const SB_URL='https://hyvbxpsjgoqsazvmkjgb.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5dmJ4cHNqZ29xc2F6dm1ramdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MTAxODgsImV4cCI6MjA5MDE4NjE4OH0.1iM_hO2Wu3kcVYbXrfhjYqiPT3BU5asANkgvqMt_0qY';

const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DEFAULT_MEMBERS=['Carlos','Manu','Dani'];
const DEFAULT_CLIENTS=['Melia Isla Canela','Melia Benidorm','Clinica Sagur','Alessandro Thione','Lucia Piccoli Miracoli','Asociación Comerciantes Benalua'];

const SC={'● LIVE':'sl','● In Progress':'sg','◐ Revisión':'so','◆ Planificado':'spn','↻ Ongoing':'so','⏸ On Hold':'sh2','✓ Done':'sd'};
const PC={Carlos:{cls:'pbC',av:'avC',i:'C'},Manu:{cls:'pbM',av:'avM',i:'M'},Dani:{cls:'pbD',av:'avD',i:'D'}};

let tasks=[],clients=[...DEFAULT_CLIENTS],members=[...DEFAULT_MEMBERS];
let editId=null,popField=null,popTaskId=null;
let vView='all',vPart='all',vMonth='all',vStat='all',vCli='all';

// ══ SUPABASE ══════════════════════════════════════════════════════════════════
async function sb(path,opts={}){
  const r=await fetch(SB_URL+'/rest/v1/'+path,{
    ...opts,
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'',...(opts.headers||{})}
  });
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
}
const getTasks=()=>sb('tasks?order=created_at.asc&select=*');
const getClients=()=>sb('clients?order=name.asc&select=*');
const getMembers=()=>sb('members?order=name.asc&select=*');
const addTaskDB=d=>sb('tasks',{method:'POST',prefer:'return=representation',body:JSON.stringify(d)});
const updTaskDB=(id,d)=>sb(`tasks?id=eq.${id}`,{method:'PATCH',prefer:'return=representation',body:JSON.stringify(d)});
const delTaskDB=id=>sb(`tasks?id=eq.${id}`,{method:'DELETE'});
const addCliDB=n=>sb('clients',{method:'POST',prefer:'return=representation',body:JSON.stringify({name:n})});
const delCliDB=id=>sb(`clients?id=eq.${id}`,{method:'DELETE'});
const addMemberDB=n=>sb('members',{method:'POST',prefer:'return=representation',body:JSON.stringify({name:n})});
const delMemberDB=id=>sb(`members?id=eq.${id}`,{method:'DELETE'});

// ══ BOOT ══════════════════════════════════════════════════════════════════════
async function boot(){
  try{
    const[t,c,m]=await Promise.all([getTasks(),getClients().catch(()=>null),getMembers().catch(()=>null)]);
    tasks=t||[];
    if(c&&c.length)clients=c.map(x=>x.name);
    if(m&&m.length)members=m.map(x=>x.name);
    document.getElementById('connecting').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('dateBadge').textContent=new Date().toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
    render();
    setInterval(async()=>{try{tasks=await getTasks();render();}catch(e){}},20000);
  }catch(e){
    document.getElementById('connecting').innerHTML=`<div style="color:#e74c3c;font-family:'DM Mono',monospace;font-size:12px;text-align:center;padding:24px;max-width:380px;line-height:1.8"><div style="font-size:28px;margin-bottom:12px">⚠</div><b>Error de conexión</b><br>${esc(e.message)}</div>`;
  }
}

// ══ RENDER ════════════════════════════════════════════════════════════════════
function filtered(){
  return tasks.filter(t=>{
    if(vPart!=='all'&&t.owner!==vPart)return false;
    if(vMonth!=='all'&&t.month!==vMonth)return false;
    if(vStat!=='all'&&t.status!==vStat)return false;
    if(vCli!=='all'){
      const clis=parseClients(t.client);
      if(!clis.includes(vCli))return false;
    }
    return true;
  });
}

function render(){buildMNav();buildCliNav();buildMemberNav();buildStats();buildFbar();buildContent();}

function buildMNav(){
  const nav=document.getElementById('mNav');
  nav.innerHTML=`<div class="mr ${vMonth==='all'?'act':''}" onclick="fMonth('all')">Todos <span class="mcnt">${tasks.length}</span></div>`+
    MONTHS.map(m=>{const c=tasks.filter(t=>t.month===m).length;if(!c&&vMonth!==m)return '';
      return `<div class="mr ${vMonth===m?'act':''}" onclick="fMonth('${m}')">${m.slice(0,3)} <span class="mcnt">${c}</span></div>`;
    }).join('');
}

function buildCliNav(){
  const nav=document.getElementById('cliNav');
  nav.innerHTML=clients.map(cli=>{
    const c=tasks.filter(t=>parseClients(t.client).includes(cli)).length;
    return `<div class="cli-row ${vCli===cli?'act':''}" onclick="fCli('${cli.replace(/'/g,"\\'")}',this)">
      <span class="cli-name" title="${esc(cli)}">${esc(cli)}</span>${c?`<span class="mcnt">${c}</span>`:''}
    </div>`;
  }).join('');
}

function buildMemberNav(){
  const nav=document.getElementById('memberNav');
  if(!nav)return;
  nav.innerHTML=members.map(m=>{
    const pc=PC[m]||{};
    return `<div class="pr ${vPart===m?'act':''}" onclick="fPart('${m.replace(/'/g,"\\'")}',this)">
      <div class="av ${pc.av||''}" style="${!pc.av?'background:var(--d4);color:var(--si2);border:1px solid rgba(255,255,255,0.1)':''}">${m.slice(0,1)}</div>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m}</span>
    </div>`;
  }).join('');
}

function buildStats(){
  const f=filtered(),tot=f.length;
  const live=f.filter(t=>t.status==='● LIVE'||t.status==='● In Progress').length;
  const done=f.filter(t=>t.status==='✓ Done').length;
  const pct=tot?Math.round(done/tot*100):0;
  const byP=p=>f.filter(t=>t.owner===p).length;
  document.getElementById('stats').innerHTML=`
    <div class="sc"><div class="slbl">Total</div><div class="sval ac">${tot}</div><div class="ssub">tareas</div></div>
    <div class="sc"><div class="slbl">En curso</div><div class="sval">${live}</div><div class="ssub">${tot?Math.round(live/tot*100):0}% del total</div></div>
    <div class="sc"><div class="slbl">Completadas</div><div class="sval">${done}</div>
      <div style="display:flex;align-items:center;gap:7px;margin-top:8px">
        <div class="pt" style="flex:1"><div class="pf" style="width:${pct}%;background:#27ae60"></div></div>
        <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--si2)">${pct}%</span>
      </div>
    </div>
    <div class="sc"><div class="slbl">Por responsable</div><div style="margin-top:5px">
      ${members.map(p=>`<div class="pr2"><span class="pn">${p}</span><div class="pt"><div class="pf" style="width:${tot?byP(p)/tot*100:0}%"></div></div><span class="pc">${byP(p)}</span></div>`).join('')}
    </div></div>`;
}

function buildFbar(){
  const statuses=['all','● LIVE','● In Progress','◐ Revisión','◆ Planificado','↻ Ongoing','⏸ On Hold','✓ Done'];
  document.getElementById('fbar').innerHTML=`<span class="fl2">Estado</span>`+
    statuses.map(s=>`<button class="chip ${vStat===s?'act':''}" onclick="fStat('${s.replace(/'/g,"\\'")}')">${s==='all'?'Todos':s}</button>`).join('');
}

// ── helpers ──
function parseClients(v){
  if(!v)return[];
  try{const p=JSON.parse(v);return Array.isArray(p)?p:[p];}catch{return v?[v]:[];}
}
function renderClients(arr){
  if(!arr||!arr.length)return `<span class="editable-dash" onclick="openPop(event,'clients',this.closest('tr,div.task-card').dataset.id)">+ cliente</span>`;
  return arr.map(c=>`<span class="ctag">${esc(c)}</span>`).join(' ');
}
function renderOwner(owner){
  if(!owner)return `<span class="editable-dash" onclick="openPop(event,'owner',this.closest('tr,div.task-card').dataset.id)">+ asignar</span>`;
  const pc=PC[owner]||{};
  return `<span class="pb ${pc.cls||'pb-gen'} editable" onclick="openPop(event,'owner',this.closest('[data-id]').dataset.id)">
    <span class="av ${pc.av||''}" style="width:18px;height:18px;font-size:8px;${!pc.av?'background:var(--d4);color:var(--si2)':''}">${owner.slice(0,1)}</span>${esc(owner)}
  </span>`;
}
function renderStatus(status,id){
  const ss=SC[status]||'spe';
  return `<span class="sp ${ss}" onclick="openPop(event,'status','${id}')">${esc(status||'Sin estado')}</span>`;
}
function renderDate(val,id,field){
  const label=field==='date_start'?'F. Inicio':'F. Entrega';
  if(!val)return `<span class="editable-dash" onclick="openPop(event,'${field}','${id}')">+ fecha</span>`;
  return `<span class="dt editable" onclick="openPop(event,'${field}','${id}')">${fmtDate(val)}</span>`;
}
function renderLink(val,id){
  if(!val)return `<span class="editable-dash" onclick="openPop(event,'link','${id}')">+ enlace</span>`;
  return `<a href="${esc(val)}" target="_blank" rel="noopener" class="lnk">↗ Ver</a>
    <span class="editable" style="font-size:10px;color:var(--si)" onclick="openPop(event,'link','${id}')"> ✎</span>`;
}
function renderMonth(val,id){
  if(!val)return `<span class="editable-dash" onclick="openPop(event,'month','${id}')">+ mes</span>`;
  return `<span class="mt editable" onclick="openPop(event,'month','${id}')">${val.slice(0,3)}</span>`;
}
function fmtDate(d){if(!d)return '—';try{const[y,m,day]=d.split('-');return`${day}/${m}/${y.slice(2)}`;}catch{return d;}}

// ── build content ──
function buildContent(){
  const c=document.getElementById('content');
  if(vView==='ms'){buildMS(c);return;}
  const f=filtered();
  // Desktop table
  let h=`<div class="sh">
    <div class="st">Tareas y proyectos</div>
    <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--si2)">${f.length} resultados</span>
  </div>
  <div class="tw"><div class="tw-scroll"><table>
    <thead><tr>
      <th>Tarea</th><th>Responsable</th><th>Clientes</th><th>Estado</th>
      <th>F. Inicio</th><th>F. Entrega</th><th>Enlace</th><th>Mes</th><th></th>
    </tr></thead><tbody>`;
  if(!f.length){
    h+=`<tr class="er"><td colspan="9"><div style="font-size:28px;opacity:.3;margin-bottom:10px">◈</div>Sin tareas — <span style="color:var(--y);cursor:pointer" onclick="openModal()">añade la primera</span></td></tr>`;
  }else{
    const grp={};f.forEach(t=>{if(!grp[t.month])grp[t.month]=[];grp[t.month].push(t);});
    const ord=vMonth!=='all'?[vMonth]:MONTHS.filter(m=>grp[m]);
    ord.forEach(month=>{
      if(!grp[month])return;
      if(vMonth==='all')h+=`<tr class="mg"><td colspan="9"><span class="mgl">${month.toUpperCase()} 2026</span></td></tr>`;
      grp[month].forEach(t=>{
        const clis=parseClients(t.client);
        h+=`<tr data-id="${t.id}">
          <td class="tn">${esc(t.task)}${t.milestone==='yes'?'<span class="mstar">◆</span>':''}</td>
          <td>${renderOwner(t.owner)}</td>
          <td style="white-space:normal">${renderClients(clis)} <span class="editable" style="font-size:10px;color:var(--si);cursor:pointer" onclick="openPop(event,'clients','${t.id}')">✎</span></td>
          <td>${renderStatus(t.status,t.id)}</td>
          <td>${renderDate(t.date_start,t.id,'date_start')}</td>
          <td>${renderDate(t.date_end,t.id,'date_end')}</td>
          <td>${renderLink(t.link,t.id)}</td>
          <td>${renderMonth(t.month,t.id)}</td>
          <td class="ta">
            <button class="ib" onclick="editTask('${t.id}')">✎</button>
            <button class="ib del" onclick="deleteTask('${t.id}')">✕</button>
          </td>
        </tr>`;
      });
    });
  }
  h+=`</tbody></table></div></div>`;

  // Mobile cards
  h+=`<div class="card-list">`;
  if(!f.length){
    h+=`<div style="text-align:center;padding:40px;color:var(--si2);font-size:13px">
      <div style="font-size:28px;opacity:.3;margin-bottom:10px">◈</div>
      Sin tareas — <span style="color:var(--y);cursor:pointer" onclick="openModal()">añade la primera</span>
    </div>`;
  }else{
    f.forEach(t=>{
      const clis=parseClients(t.client);
      const pc=PC[t.owner]||{};
      h+=`<div class="task-card" data-id="${t.id}">
        <div class="tc-top">
          <div class="tc-name">${esc(t.task)}${t.milestone==='yes'?'<span class="mstar">◆</span>':''}</div>
          <div class="tc-actions">
            <button class="ib" onclick="editTask('${t.id}')">✎</button>
            <button class="ib del" onclick="deleteTask('${t.id}')">✕</button>
          </div>
        </div>
        <div class="tc-meta">
          ${renderStatus(t.status,t.id)}
          ${t.owner?`<span class="pb ${pc.cls||'pb-gen'} editable" onclick="openPop(event,'owner','${t.id}')"><span class="av ${pc.av||''}" style="width:18px;height:18px;font-size:8px;${!pc.av?'background:var(--d4);color:var(--si2)':''}">${t.owner.slice(0,1)}</span>${esc(t.owner)}</span>`:`<span class="editable-dash" onclick="openPop(event,'owner','${t.id}')">+ asignar</span>`}
          ${clis.map(c=>`<span class="ctag">${esc(c)}</span>`).join('')}
          <span class="editable" style="font-size:11px;color:var(--si);cursor:pointer" onclick="openPop(event,'clients','${t.id}')">👥</span>
        </div>
        <div class="tc-grid">
          <div class="tc-field">
            <span class="tc-lbl">F. Inicio</span>
            ${renderDate(t.date_start,t.id,'date_start')}
          </div>
          <div class="tc-field">
            <span class="tc-lbl">F. Entrega</span>
            ${renderDate(t.date_end,t.id,'date_end')}
          </div>
          <div class="tc-field">
            <span class="tc-lbl">Mes</span>
            ${renderMonth(t.month,t.id)}
          </div>
          <div class="tc-field">
            <span class="tc-lbl">Enlace</span>
            ${renderLink(t.link,t.id)}
          </div>
        </div>
      </div>`;
    });
  }
  h+=`</div>`;
  c.innerHTML=h;
}

function buildMS(c){
  const ms=filtered().filter(t=>t.milestone==='yes');
  let h=`<div class="sh"><div class="st">Hitos clave</div><button class="btn-add" onclick="openModal()" style="font-size:12px;padding:8px 14px">+ Nuevo hito</button></div>`;
  if(!ms.length){
    h+=`<div style="text-align:center;padding:44px;color:var(--si2)"><div style="font-size:30px;opacity:.3;margin-bottom:10px">◆</div>Sin hitos. <span style="color:var(--y);cursor:pointer" onclick="openModal()">Añadir</span></div>`;
  }else{
    h+=`<div class="msg">`+ms.map(t=>{
      const ss=SC[t.status]||'spe';
      const clis=parseClients(t.client);
      return`<div class="mc ${t.status==='✓ Done'?'done':t.status==='⏸ On Hold'?'hold':''}" data-id="${t.id}">
        <div class="mct">${esc(t.task)}</div>
        <div style="margin-bottom:9px;display:flex;gap:6px;flex-wrap:wrap">
          ${renderStatus(t.status,t.id)}
          ${clis.map(c=>`<span class="ctag">${esc(c)}</span>`).join('')}
        </div>
        <div class="mcm">
          <div style="display:flex;flex-direction:column;gap:5px">
            ${t.owner?`<span class="pb ${(PC[t.owner]||{}).cls||'pb-gen'} editable" onclick="openPop(event,'owner','${t.id}')" style="font-size:11px"><span class="av ${(PC[t.owner]||{}).av||''}" style="width:16px;height:16px;font-size:8px">${t.owner.slice(0,1)}</span>${esc(t.owner)}</span>`:''}
            <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:2px">
              ${renderMonth(t.month,t.id)}
              ${t.date_end?`<span class="dt editable" onclick="openPop(event,'date_end','${t.id}')">→ ${fmtDate(t.date_end)}</span>`:`<span class="editable-dash" onclick="openPop(event,'date_end','${t.id}')">+ entrega</span>`}
              ${t.link?`<a href="${esc(t.link)}" target="_blank" class="lnk">↗</a>`:''}
            </div>
          </div>
          <div style="display:flex;gap:3px">
            <button class="ib" onclick="editTask('${t.id}')">✎</button>
            <button class="ib del" onclick="deleteTask('${t.id}')">✕</button>
          </div>
        </div>
      </div>`;
    }).join('')+`</div>`;
  }
  c.innerHTML=h;
}

// ══ INLINE POPOVER ════════════════════════════════════════════════════════════
let popSelectedClients=[];

window.openPop=function(e,field,id){
  e.stopPropagation();
  closePop();
  popField=field;popTaskId=id;
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const pop=document.getElementById('pop');
  const titles={status:'Estado',owner:'Responsable',clients:'Clientes',date_start:'Fecha inicio',date_end:'Fecha entrega',link:'Enlace',month:'Mes'};
  document.getElementById('pop-title').textContent=titles[field]||field;

  let body='';
  if(field==='status'){
    const opts=['● LIVE','● In Progress','◐ Revisión','◆ Planificado','↻ Ongoing','⏸ On Hold','✓ Done'];
    body=opts.map(s=>`<div class="pop-opt ${t.status===s?'sel':''}" onclick="saveInline('status','${s.replace(/'/g,"\\'")}')"><span class="sp ${SC[s]||'spe'}" style="pointer-events:none">${s}</span></div>`).join('');
  }else if(field==='owner'){
    body=['', ...members].map(m=>`<div class="pop-opt ${t.owner===m?'sel':''}" onclick="saveInline('owner','${m.replace(/'/g,"\\'")}')">
      ${m?`<span class="av ${(PC[m]||{}).av||''}" style="width:20px;height:20px;font-size:9px;${!(PC[m]||{}).av?'background:var(--d4);color:var(--si2)':''}">${m.slice(0,1)}</span>${m}`:'<span style="color:var(--si)">Sin asignar</span>'}
    </div>`).join('');
  }else if(field==='month'){
    body=MONTHS.map(m=>`<div class="pop-opt ${t.month===m?'sel':''}" onclick="saveInline('month','${m}')">${m}</div>`).join('');
  }else if(field==='clients'){
    popSelectedClients=[...parseClients(t.client)];
    body=`<div style="max-height:200px;overflow-y:auto">`+
      clients.map(c=>`<label class="pop-check">
        <input type="checkbox" ${popSelectedClients.includes(c)?'checked':''} onchange="toggleCliPop('${c.replace(/'/g,"\\'")}')"/> ${esc(c)}
      </label>`).join('')+`</div>
      <div class="pop-confirm" style="margin-top:8px">
        <button class="pop-cancel" onclick="closePop()">Cancelar</button>
        <button class="pop-btn" onclick="saveClientsInline()">Guardar</button>
      </div>`;
  }else if(field==='date_start'||field==='date_end'){
    const cur=t[field]||'';
    body=`<input type="date" class="pop-input" id="pop-date-val" value="${cur}"/>
      <div class="pop-confirm">
        <button class="pop-cancel" onclick="closePop()">Cancelar</button>
        <button class="pop-btn" onclick="saveInline('${field}',document.getElementById('pop-date-val').value||null)">Guardar</button>
      </div>`;
  }else if(field==='link'){
    body=`<input class="pop-input" id="pop-link-val" value="${esc(t.link||'')}" placeholder="https://…"/>
      <div class="pop-confirm">
        <button class="pop-cancel" onclick="closePop()">Cancelar</button>
        <button class="pop-btn" onclick="saveInline('link',document.getElementById('pop-link-val').value.trim())">Guardar</button>
      </div>`;
  }
  document.getElementById('pop-body').innerHTML=body;
  pop.classList.add('open');
  // Position
  const rect=e.target.getBoundingClientRect();
  let top=rect.bottom+6,left=rect.left;
  const pw=220;
  if(left+pw>window.innerWidth)left=window.innerWidth-pw-8;
  if(left<8)left=8;
  if(top+320>window.innerHeight)top=rect.top-Math.min(320,rect.top-8);
  pop.style.top=top+'px';pop.style.left=left+'px';
  // Focus inputs
  setTimeout(()=>{
    const inp=pop.querySelector('input[type=date],input.pop-input');
    if(inp)inp.focus();
  },50);
};

window.toggleCliPop=function(name){
  const idx=popSelectedClients.indexOf(name);
  if(idx>=0)popSelectedClients.splice(idx,1);else popSelectedClients.push(name);
};

window.saveClientsInline=async function(){
  closePop();
  const val=JSON.stringify(popSelectedClients);
  await doSaveInline('client',val);
};

window.saveInline=async function(field,val){
  closePop();
  await doSaveInline(field,val);
};

async function doSaveInline(field,val){
  try{
    const data={[field]:val,updated_at:new Date().toISOString()};
    await updTaskDB(popTaskId,data);
    tasks=tasks.map(t=>t.id===popTaskId?{...t,...data}:t);
    render();toast('Guardado ✓');
  }catch(e){toast('Error: '+e.message,true);}
}

function closePop(){document.getElementById('pop').classList.remove('open');}
document.addEventListener('click',e=>{
  if(!e.target.closest('.pop')&&!e.target.closest('.editable')&&!e.target.closest('.editable-dash')&&!e.target.closest('.sp'))closePop();
});

// ══ FILTERS ══════════════════════════════════════════════════════════════════
window.setView=function(v,el){vView=v;document.querySelectorAll('.ni').forEach(e=>e.classList.remove('act'));el.classList.add('act');render();closeSb();};
window.fPart=function(p,el){vPart=p;document.querySelectorAll('.pr').forEach(e=>e.classList.remove('act'));el.classList.add('act');render();closeSb();};
window.fMonth=function(m){vMonth=m;render();closeSb();};
window.fStat=function(s){vStat=s;render();};
window.fCli=function(c,el){vCli=c;document.querySelectorAll('.cli-row').forEach(e=>e.classList.remove('act'));if(el)el.classList.add('act');render();closeSb();};

// ══ TASK MODAL ════════════════════════════════════════════════════════════════
function populateModalSelects(task){
  // owner
  const osel=document.getElementById('f-owner');
  osel.innerHTML='<option value="">— Seleccionar —</option>'+members.map(m=>`<option value="${m}" ${task?.owner===m?'selected':''}>${m}</option>`).join('');
  // clients multi
  const wrap=document.getElementById('f-clients-wrap');
  const sel=parseClients(task?.client);
  wrap.innerHTML=clients.map(c=>`<label class="mcheck"><input type="checkbox" value="${esc(c)}" ${sel.includes(c)?'checked':''}/> ${esc(c)}</label>`).join('');
}

window.openModal=function(task){
  editId=task?.id||null;
  document.getElementById('mtit').innerHTML=task?'✎ Editar <em>tarea</em>':'+ Nueva <em>tarea</em>';
  document.getElementById('f-task').value=task?.task||'';
  document.getElementById('f-status').value=task?.status||'● In Progress';
  document.getElementById('f-month').value=task?.month||MONTHS[new Date().getMonth()];
  document.getElementById('f-date-start').value=task?.date_start||'';
  document.getElementById('f-date-end').value=task?.date_end||'';
  document.getElementById('f-link').value=task?.link||'';
  document.getElementById('f-desc').value=task?.description||'';
  document.getElementById('f-next').value=task?.next_steps||'';
  document.getElementById('f-block').value=task?.blockers||'';
  document.getElementById('f-collab').value=task?.collab||'';
  document.getElementById('f-ms').value=task?.milestone||'no';
  populateModalSelects(task);
  document.getElementById('ov').classList.add('open');
  setTimeout(()=>document.getElementById('f-task').focus(),80);
};
window.closeModal=function(){document.getElementById('ov').classList.remove('open');};
window.closeOv=function(e){if(e.target.id==='ov')closeModal();};
window.editTask=function(id){const t=tasks.find(t=>t.id===id);if(t)openModal(t);};
window.deleteTask=async function(id){
  if(!confirm('¿Eliminar esta tarea?'))return;
  try{await delTaskDB(id);tasks=tasks.filter(t=>t.id!==id);render();toast('Tarea eliminada');}
  catch(e){toast('Error: '+e.message,true);}
};

window.saveTask=async function(){
  const task=document.getElementById('f-task').value.trim();
  if(!task){document.getElementById('f-task').style.borderColor='#E74C3C';return;}
  document.getElementById('f-task').style.borderColor='';
  const btn=document.getElementById('sbtn');btn.disabled=true;btn.textContent='Guardando…';
  // collect selected clients
  const selectedCli=Array.from(document.querySelectorAll('#f-clients-wrap input:checked')).map(x=>x.value);
  const data={
    task,
    owner:document.getElementById('f-owner').value,
    client:JSON.stringify(selectedCli),
    collab:document.getElementById('f-collab').value.trim(),
    status:document.getElementById('f-status').value,
    month:document.getElementById('f-month').value,
    date_start:document.getElementById('f-date-start').value||null,
    date_end:document.getElementById('f-date-end').value||null,
    link:document.getElementById('f-link').value.trim(),
    description:document.getElementById('f-desc').value.trim(),
    next_steps:document.getElementById('f-next').value.trim(),
    blockers:document.getElementById('f-block').value.trim(),
    milestone:document.getElementById('f-ms').value,
    updated_at:new Date().toISOString(),
  };
  try{
    if(editId){await updTaskDB(editId,data);tasks=tasks.map(t=>t.id===editId?{...t,...data}:t);toast('Tarea actualizada ✓');}
    else{const res=await addTaskDB(data);const c=Array.isArray(res)?res[0]:res;if(c)tasks.push(c);else tasks=await getTasks();toast('Tarea añadida ✓');}
    closeModal();render();
  }catch(e){toast('Error: '+e.message,true);}
  btn.disabled=false;btn.textContent='Guardar tarea';
};

// ══ MEMBER MODAL ══════════════════════════════════════════════════════════════
window.openMemberModal=function(){renderMemberList();document.getElementById('memberOv').classList.add('open');setTimeout(()=>document.getElementById('newMemberInput').focus(),80);};
window.closeMemberModal=function(){document.getElementById('memberOv').classList.remove('open');};
function renderMemberList(){
  document.getElementById('memberList').innerHTML=members.length
    ?members.map((m,i)=>`<div class="cli-item"><span>${m}</span><button class="ib del" onclick="removeMember(${i})">✕</button></div>`).join('')
    :'<div style="color:var(--si);font-size:12px;padding:8px">Sin responsables.</div>';
}
window.addMember=async function(){
  const inp=document.getElementById('newMemberInput'),name=inp.value.trim();
  if(!name||members.includes(name)){inp.style.borderColor='#E74C3C';return;}
  inp.style.borderColor='';
  try{await addMemberDB(name);}catch(e){}
  members.push(name);inp.value='';renderMemberList();buildMemberNav();render();toast('Responsable añadido ✓');
};
window.removeMember=async function(idx){
  if(!confirm(`¿Eliminar "${members[idx]}"?`))return;
  try{const r=await sb(`members?name=eq.${encodeURIComponent(members[idx])}&select=id`);if(r&&r[0])await delMemberDB(r[0].id);}catch(e){}
  members.splice(idx,1);renderMemberList();buildMemberNav();
  if(vPart!=='all'&&!members.includes(vPart)){vPart='all';}render();
};

// ══ CLIENT MODAL ══════════════════════════════════════════════════════════════
window.openCliModal=function(){renderCliList();document.getElementById('cliOv').classList.add('open');setTimeout(()=>document.getElementById('newCliInput').focus(),80);};
window.closeCliModal=function(){document.getElementById('cliOv').classList.remove('open');};
function renderCliList(){
  document.getElementById('cliList').innerHTML=clients.length
    ?clients.map((c,i)=>`<div class="cli-item"><span>${esc(c)}</span><button class="ib del" onclick="removeClient(${i})">✕</button></div>`).join('')
    :'<div style="color:var(--si);font-size:12px;padding:8px">Sin clientes.</div>';
}
window.addClient=function(){
  const inp=document.getElementById('newCliInput'),name=inp.value.trim();
  if(!name||clients.includes(name)){inp.style.borderColor='#E74C3C';return;}
  inp.style.borderColor='';clients.push(name);inp.value='';renderCliList();buildCliNav();toast('Cliente añadido ✓');
};
window.removeClient=function(idx){
  if(!confirm(`¿Eliminar "${clients[idx]}"?`))return;
  clients.splice(idx,1);renderCliList();buildCliNav();
  if(vCli!=='all'&&!clients.includes(vCli)){vCli='all';render();}
};

// ══ SIDEBAR MOBILE ════════════════════════════════════════════════════════════
window.toggleSb=function(){
  const sb=document.getElementById('sidebar'),ov=document.getElementById('sb-overlay');
  const open=sb.classList.toggle('open');
  ov.classList.toggle('open',open);
};
window.closeSb=function(){
  if(window.innerWidth>768)return;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('open');
};

// ══ UTILS ════════════════════════════════════════════════════════════════════
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,err=false){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show'+(err?' err':'');setTimeout(()=>el.classList.remove('show'),3000);}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeCliModal();closeMemberModal();closePop();}
  if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))saveTask();
});

boot();
</script>
</body>
</html>
